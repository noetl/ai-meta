# Bridge task: list noetl namespace pods.
#
# This file IS a noetl playbook — the watcher invokes it directly
# via `noetl exec --runtime local <this-file> --json`. The playbook's
# return envelope becomes the bridge result.
#
# Uses `kind: shell` because the Rust local runtime supports a
# limited set of tool kinds (shell, http, playbook, duckdb, auth,
# sink). `kind: python` is distributed-runtime only.
#
# bridge-approval: auto

apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: bridge_example_get_pods
  path: bridge/examples/get_pods
  description: Read-only smoke that returns the noetl-namespace pod list
  exposes_as_mcp: false
  tags:
    - bridge
    - example
    - read-only

executor:
  profile: local
  version: noetl-runtime/1

workload:
  namespace: noetl

workflow:
  - step: list_pods
    desc: kubectl get pods + capture output
    tool:
      kind: shell
      cmds:
        - kubectl -n {{ workload.namespace }} get pods -o wide
    next:
      arcs:
        - step: end

  - step: end
